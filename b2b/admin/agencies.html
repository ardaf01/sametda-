<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mountain VIP Transfer - B2B Acente Yönetimi</title>
    
    <!-- Google Fonts & Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="/b2b/style.css?v=1.2">
</head>
<body>

    <div class="dashboard-container">
        
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="/assets/logo.png" alt="Mountain VIP">
            </div>
            <ul class="sidebar-menu">
                <li>
                    <a href="index.html" class="sidebar-link">
                        <i class="fas fa-tasks"></i>
                        <span>Rezervasyonlar</span>
                    </a>
                </li>
                <li>
                    <a href="agencies.html" class="sidebar-link active">
                        <i class="fas fa-building"></i>
                        <span>Acenteler</span>
                    </a>
                </li>
                <li style="margin-top: 2rem;">
                    <a href="../dashboard.html" class="sidebar-link" style="color: var(--accent-gold);">
                        <i class="fas fa-chevron-left"></i>
                        <span>Acente Paneli</span>
                    </a>
                </li>
            </ul>
            <div class="sidebar-footer">
                <a href="#" onclick="logoutUser(); return false;" class="sidebar-link" style="color: var(--danger-color);">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Çıkış Yap</span>
                </a>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            
            <!-- Content Header Bar -->
            <header class="content-header">
                <div class="page-title">
                    <h1>B2B Acente Yönetimi</h1>
                    <p>Kayıtlı acentelerin cari limitleri, komisyon oranları ve borç detayları.</p>
                </div>
                <div class="user-profile-menu" id="user-profile-menu">
                    <div class="spinner" style="width: 20px; height: 20px; border-width: 2px;"></div>
                </div>
            </header>

            <div class="dashboard-grid" style="grid-template-columns: 2fr 1fr; gap: 1.5rem;">
                
                <!-- Left: Agencies List -->
                <div class="table-container" style="margin-bottom: 0;">
                    <div class="table-header-row">
                        <h2>Kayıtlı Acenteler</h2>
                    </div>
                    
                    <div class="table-responsive">
                        <table class="b2b-table">
                            <thead>
                                <tr>
                                    <th>Şirket Adı</th>
                                    <th>Yetkili</th>
                                    <th>Telefon &amp; E-Posta</th>
                                    <th>İndirim</th>
                                    <th>Limit</th>
                                    <th>Borç (Bakiye)</th>
                                </tr>
                            </thead>
                            <tbody id="admin-agencies-tbody">
                                <tr>
                                    <td colspan="7" class="loading-wrapper">
                                        <div class="spinner"></div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Right: Agency Registration Guidelines & Inline Editor Form -->
                <div>
                    <div class="card" id="agency-edit-card" style="display: none; border-color: var(--accent-gold);">
                        <h2 class="text-gold"><i class="fas fa-edit"></i> Acente Bilgilerini Düzenle</h2>
                        <form id="agency-edit-form">
                            <input type="hidden" id="edit-agency-id">
                            
                            <div class="form-group">
                                <label class="form-label" for="edit-agency-name">Şirket / Acente Adı</label>
                                <input type="text" id="edit-agency-name" class="form-control" style="padding-left:1rem;" required>
                            </div>
                            
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 0.8rem;">
                                <div class="form-group" style="margin-bottom:0;">
                                    <label class="form-label" for="edit-contact-person">Yetkili Adı</label>
                                    <input type="text" id="edit-contact-person" class="form-control" style="padding-left:1rem;" required>
                                </div>
                                <div class="form-group" style="margin-bottom:0;">
                                    <label class="form-label" for="edit-phone">Telefon Numarası</label>
                                    <input type="text" id="edit-phone" class="form-control" style="padding-left:1rem;" required>
                                </div>
                            </div>
                            
                            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem;">
                                <div class="form-group">
                                    <label class="form-label" for="edit-discount">İndirim Oranı (%)</label>
                                    <input type="number" id="edit-discount" class="form-control" style="padding-left:1rem;" min="0" max="100" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="edit-limit">Limit (€)</label>
                                    <input type="number" id="edit-limit" class="form-control" style="padding-left:1rem;" min="0" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="edit-balance">Borç (€)</label>
                                    <input type="number" id="edit-balance" class="form-control" style="padding-left:1rem;" step="0.01" required>
                                </div>
                            </div>
                            
                            <div style="display: flex; gap: 0.5rem; margin-top: 1.5rem;">
                                <button type="submit" class="btn-gold" style="flex: 1;">Kaydet</button>
                                <button type="button" class="btn-outline" onclick="closeEditCard()">İptal</button>
                            </div>
                        </form>
                    </div>

                    <div class="card" id="add-agency-card">
                        <h2><i class="fas fa-user-plus"></i> Yeni Acente Ekle</h2>
                        <div id="add-agency-alert" style="margin-top:0.5rem; margin-bottom:1rem;"></div>
                        
                        <form id="agency-add-form">
                            <div class="form-group">
                                <label class="form-label" for="add-company-name">Şirket / Acente Adı</label>
                                <input type="text" id="add-company-name" class="form-control" placeholder="Örn: Sunny Tours" style="padding-left:1rem;" required>
                            </div>
                            
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                <div class="form-group">
                                    <label class="form-label" for="add-contact-person">Yetkili Adı</label>
                                    <input type="text" id="add-contact-person" class="form-control" placeholder="Örn: Hans Müller" style="padding-left:1rem;" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="add-phone">Telefon Numarası</label>
                                    <input type="text" id="add-phone" class="form-control" placeholder="Örn: +49170xxx" style="padding-left:1rem;" required>
                                </div>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label" for="add-email">Acente Giriş E-postası</label>
                                <input type="email" id="add-email" class="form-control" placeholder="Örn: login@sunnytours.com" style="padding-left:1rem;" required>
                            </div>
                            
                            <div class="form-group">
                                <label class="form-label" for="add-password">Acente Giriş Şifresi</label>
                                <input type="password" id="add-password" class="form-control" placeholder="Minimum 6 haneli şifre" style="padding-left:1rem;" minlength="6" required>
                            </div>
                            
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                <div class="form-group">
                                    <label class="form-label" for="add-discount">İndirim Oranı (%)</label>
                                    <input type="number" id="add-discount" class="form-control" style="padding-left:1rem;" min="0" max="100" value="15" required>
                                </div>
                                <div class="form-group">
                                    <label class="form-label" for="add-limit">Kredi Limiti (€)</label>
                                    <input type="number" id="add-limit" class="form-control" style="padding-left:1rem;" min="0" value="1000" required>
                                </div>
                            </div>
                            
                            <button type="submit" id="add-agency-btn" class="btn-gold" style="width: 100%; margin-top: 1rem;">
                                <i class="fas fa-plus"></i> Acenteyi Kaydet &amp; Yetkilendir
                            </button>
                        </form>
                    </div>
                </div>
                
            </div>

        </main>
    </div>

    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="/b2b/js/db-config.js?v=1.5"></script>
    <script src="/b2b/js/auth.js?v=1.5"></script>
    <script src="/b2b/js/admin-dashboard.js?v=1.6"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Oturumu denetle (Sadece Admin girebilir)
            const authData = await requireAuth('admin');
            if (!authData) return;

            // Acenteler listesini yükle
            await initAdminAgenciesPage(authData.profile);
        });
    </script>
</body>
</html>
